<svg width="580" height="190" viewBox="0 0 580 190" xmlns="http://www.w3.org/2000/svg">

  <!-- POLICY — right-aligned tight to separator -->
  <text x="148" y="122"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="42" font-weight="600" fill="#0D1B3E"
    text-anchor="end" letter-spacing="-0.5">Policy</text>

  <!-- GOLD SEPARATOR LINE -->
  <line x1="158" y1="52" x2="158" y2="146" stroke="#C9A84C" stroke-width="1"/>

  <!-- ═══════════ PILLAR (H) ═══════════ -->

  <!-- ENTABLATURE top bar -->
  <rect x="178" y="52" width="114" height="14" fill="#0D1B3E"/>

  <!-- LEFT CAPITAL -->
  <rect x="190" y="66" width="28" height="5" fill="#0D1B3E"/>
  <!-- LEFT COLUMN -->
  <rect x="195" y="71" width="22" height="58" fill="#0D1B3E"/>
  <!-- LEFT BASE -->
  <rect x="190" y="129" width="28" height="5" fill="#0D1B3E"/>

  <!-- RIGHT CAPITAL -->
  <rect x="252" y="66" width="28" height="5" fill="#0D1B3E"/>
  <!-- RIGHT COLUMN -->
  <rect x="253" y="71" width="22" height="58" fill="#0D1B3E"/>
  <!-- RIGHT BASE -->
  <rect x="252" y="129" width="28" height="5" fill="#0D1B3E"/>

  <!-- GOLD CROSSBAR — the H bar -->
  <rect x="217" y="93" width="36" height="10" fill="#C9A84C"/>

  <!-- PLINTH -->
  <rect x="182" y="134" width="106" height="8" fill="#0D1B3E"/>
  <rect x="172" y="142" width="126" height="6" fill="#0D1B3E"/>

  <!-- ═══════════ CREATIVE Q ═══════════ -->
  <!--
    Concept: Architectural ring — a bold circular O form with a sharp
    diagonal tail cut through the bottom-right. The ring stroke weight
    matches the column width (10px). The diagonal tail echoes the angle
    of authority — same gold as the crossbar.

    Center: (348, 98)  Outer R: 24  Inner r: 14  Ring thickness: 10px

    Ring path uses evenodd fill-rule.
    Outer CCW: start right (372,98) sweep left (324,98) back to right
    Inner CW:  start right (362,98) sweep left (334,98) back to right
  -->

  <path fill-rule="evenodd" fill="#C9A84C"
    d="
      M 372,98
      A 24,24 0 1 0 300,98
      A 24,24 0 1 0 372,98
      Z
      M 362,98
      A 14,14 0 1 1 320,98
      A 14,14 0 1 1 362,98
      Z
    "/>

  <!--
    TAIL: diagonal from bottom-right of ring, 45° SE
    Starts just inside the outer ring, cuts through and extends beyond.
    Built as a bold rounded-cap stroke — same visual weight as crossbar.
    Start: outer ring at ~135° clockwise from top = bottom-right
    At 45° from center(348,98): (348+17, 98+17) = (365,115) [inner]
    Extending to: (348+32, 98+32) = (380,130)
  -->
  <line
    x1="360" y1="112"
    x2="381" y2="133"
    stroke="#C9A84C"
    stroke-width="9"
    stroke-linecap="round"/>

  <!-- ═══════════ TAGLINE ═══════════ -->
  <text x="172" y="164"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
    font-size="9.5" font-weight="400" fill="#8B97B8"
    letter-spacing="3.8">INSURANCE PLATFORM</text>

</svg>
